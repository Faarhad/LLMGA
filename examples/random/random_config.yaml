simulation:
  until: 20
  max_events: 10000

scheduler:
  name: random_scheduler.py
  options:
    seed: 31

energy:
  alpha_share: 1.0
  coefficients:
    vm1:
      alpha: 26.0
      beta: 26.0
    vm2:
      alpha: 21.0
      beta: 21.0
    vm3:
      alpha: 21.0
      beta: 21.0
    vm4:
      alpha: 20.0
      beta: 20.0

metrics:
  sla_lambda: 1.0
  sla_theta: 1.0
  sla_eta_max: 2.0
  fairness_omega_1: 0.5
  fairness_omega_2: 0.5
  fairness_mu: 1.0
  fitness_w_energy: 0.5
  fitness_w_sla: 0.5
  fitness_xi: 1.0
  fitness_energy_norm_max: 4200
  fitness_sla_norm_max: 15.0

dataset:
  source: examples/sample_dataset_heavy.json
  format: json

random_seeds:
  global_seed: 123
  scheduler_seed: 456

plugins:
  - name: future_ga_plugin
    enabled: false
    entrypoint: mypkg.ga:Plugin
    options:
      mutation_rate: 0.1
      crossover_rate: 0.8
